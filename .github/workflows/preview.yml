name: PR Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Build UI preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r src _site/
          touch _site/.nojekyll

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-ui
          path: _site
          retention-days: 14

      - name: Comment preview instructions
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ui-preview
          message: |
            ## UI preview (private repo)

            This repo is private, so there is no public GitHub Pages URL. Use one of these:

            ### Option A - local (recommended)

            ```bash
            gh pr checkout ${{ github.event.pull_request.number }}
            npm install
            npx --yes serve .
            ```

            Open the URL `serve` prints (usually `http://localhost:3000`).

            ### Option B - download build

            1. Open the **PR Preview** workflow run for this commit
            2. Download artifact **`pr-${{ github.event.pull_request.number }}-ui`**
            3. Run `npx --yes serve <path-to-folder>`

            ---
            To enable hosted Pages (GitHub Team/Enterprise only), set repo variable `ENABLE_GITHUB_PAGES=true` and configure Pages from the `gh-pages` branch.
