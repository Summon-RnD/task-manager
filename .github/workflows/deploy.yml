name: CD

# Optional hosted deploy. GitHub Pages does not work on free private repos.
# Enable only with GitHub Team/Enterprise: set repo variable ENABLE_GITHUB_PAGES=true
# and configure Settings -> Pages -> Deploy from branch -> gh-pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    if: vars.ENABLE_GITHUB_PAGES == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Check app script syntax
        run: node --check src/app/main.js

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r src _site/
          touch _site/.nojekyll

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean: false
          force: false
          commit-message: Deploy production site from ${{ github.sha }}
